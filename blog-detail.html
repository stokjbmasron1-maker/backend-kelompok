<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel - JS-1 Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">JS-1 Academy</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="programs.html">Program</a></li>
                    <li class="nav-item"><a class="nav-link" href="teachers.html">Pengajar</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Tentang Kami</a></li>
                    <li class="nav-item"><a class="nav-link active" href="blog.html">Artikel</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 pt-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html">Beranda</a></li>
                <li class="breadcrumb-item"><a href="blog.html">Artikel</a></li>
                <li class="breadcrumb-item active" id="breadcrumb-title">...</li>
            </ol>
        </nav>

        <article class="mt-4" id="artikel-detail"></article>

        <div class="text-center mt-5">
            <a href="blog.html" class="btn btn-custom-primary"><i class="bi bi-arrow-left"></i> Kembali ke Daftar Artikel</a>
        </div>
    </main>

    <footer class="text-center">
        <p>&copy; 2024 || JS-1 Academy</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api';

        function formatTanggal(dateStr) {
            const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
            const d = new Date(dateStr);
            return `${d.getDate()} ${bulan[d.getMonth()]} ${d.getFullYear()}`;
        }

        async function loadDetail() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) { window.location.href = 'blog.html'; return; }

            const res = await fetch(`${API_URL}/articles/${id}`);
            if (!res.ok) { window.location.href = 'blog.html'; return; }

            const a = await res.json();
            document.title = `${a.title} - JS-1 Academy`;
            document.getElementById('breadcrumb-title').textContent = a.title;

            const contentHtml = a.content
                ? a.content.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('')
                : '';

            document.getElementById('artikel-detail').innerHTML = `
                <header class="text-center mb-4">
                    <h1 class="display-5">${a.title}</h1>
                    <p class="text-muted">
                        <i class="bi bi-person"></i> ${a.author} |
                        <i class="bi bi-calendar"></i> ${formatTanggal(a.published_date)}
                    </p>
                </header>
                <section class="article-content">${contentHtml}</section>
                <hr>
            `;
        }

        loadDetail();
    </script>
</body>
</html>
