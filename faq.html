    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container"><a class="navbar-brand" href="index.html">Bimbel Sukses</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="programs.html">Program</a></li>
                    <li class="nav-item"><a class="nav-link" href="teachers.html">Pengajar</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Tentang Kami</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Artikel</a></li>
                    <li class="nav-item"><a class="nav-link active" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container my-5 pt-5">
        <header class="text-center mb-5"><h1>Frequently Asked Questions (FAQ)</h1><p>Pertanyaan yang sering diajukan oleh calon siswa dan orang tua.</p></header>
        <div class="faq-section">
            <div class="accordion" id="faqAccordion" id="faq-container"></div>
        </div>
        <section class="text-center mt-5">
            <p>Belum menemukan jawaban yang Anda cari?</p>
            <a href="contact.html" class="btn btn-custom-primary">Hubungi Kami Langsung</a>
        </section>
    </main>
    <footer class="text-center"><p>&copy; 2024 || JS-1 Academy</p></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api';

        async function loadFAQ() {
            const res = await fetch(`${API_URL}/faqs`);
            const faqs = await res.json();
            const container = document.getElementById('faqAccordion');
            container.innerHTML = faqs.map((f, i) => `
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button ${i > 0 ? 'collapsed' : ''}" type="button"
                            data-bs-toggle="collapse" data-bs-target="#faq-${f.id}">
                            ${f.question}
                        </button>
                    </h2>
                    <div id="faq-${f.id}" class="accordion-collapse collapse ${i === 0 ? 'show' : ''}" data-bs-parent="#faqAccordion">
                        <div class="accordion-body">${f.answer}</div>
                    </div>
                </div>
            `).join('');
        }

        loadFAQ();
    </script>
</body>
</html>
