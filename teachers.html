<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-1 Academy -- Pengajar Kami</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container"><a class="navbar-brand" href="index.html">JS-1 Academy</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="programs.html">Program</a></li>
                    <li class="nav-item"><a class="nav-link active" href="teachers.html">Pengajar</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Tentang Kami</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Artikel</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container my-5 pt-5">
        <header class="text-center mb-3"><h1>Tim Pengajar Unggulan Kami</h1><p>Didedikasikan untuk membimbing Anda meraih kesuksesan.</p></header>
        <div class="row" id="teacher-container"></div>
        <div class="modal fade" id="teacherModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modal-name"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p class="text-muted" id="modal-role"></p>
                        <p id="modal-bio"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="text-center"><p>&copy; 2024 || JS-1 Academy</p></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api';

        async function loadTeachers() {
            const res = await fetch(`${API_URL}/teachers`);
            const teachers = await res.json();
            const container = document.getElementById('teacher-container');
            container.innerHTML = teachers.map(t => `
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="teacher-card" onclick="showModal(${t.id}, '${t.name} ${t.credentials || ''}', '${t.role || ''}', '${t.bio || ''}')">
                        <img src="${t.image_path || 'Pengajar/Stevania, S.Kom., M.Pd..png'}" alt="${t.name}">
                        <h5>${t.name}${t.credentials ? ', ' + t.credentials : ''}</h5>
                        <p class="text-muted">${t.role || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        function showModal(id, name, role, bio) {
            document.getElementById('modal-name').textContent = name;
            document.getElementById('modal-role').textContent = role;
            document.getElementById('modal-bio').textContent = bio;
            new bootstrap.Modal(document.getElementById('teacherModal')).show();
        }

        loadTeachers();
    </script>
</body>
</html>
