<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container"><a class="navbar-brand" href="index.html">JS-1 Academy</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="programs.html">Program</a></li>
                    <li class="nav-item"><a class="nav-link" href="teachers.html">Pengajar</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Tentang Kami</a></li>
                    <li class="nav-item"><a class="nav-link active" href="blog.html">Artikel</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container my-5 pt-5">
        <header class="text-center mb-5"><h1>Tips & Artikel Pendidikan</h1><p>Dapatkan informasi terbaru seputar dunia pendidikan.</p></header>
        <div id="artikel-container"></div>
    </main>
    <footer class="text-center"><p>&copy; 2024 || JS-1 Academy</p></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api';

        function formatTanggal(dateStr) {
            const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
            const d = new Date(dateStr);
            return `${d.getDate()} ${bulan[d.getMonth()]} ${d.getFullYear()}`;
        }

        async function loadArtikel() {
            const container = document.getElementById('artikel-container');
            const res = await fetch(`${API_URL}/articles`);
            const articles = await res.json();
            container.innerHTML = articles.map((a, i) => `
                <div class="blog-post-item">
                    <img src="${a.image_path || 'Artikel/5 Tips Efektif Belajar Matematika.jpg'}" alt="${a.title}">
                    <div class="content">
                        <h3>${a.title}</h3>
                        <p class="text-muted">Oleh ${a.author} | ${formatTanggal(a.published_date)}</p>
                        <p>${a.preview}</p>
                        <a href="blog-detail.html?id=${a.id}" class="btn btn-sm btn-outline-primary">Baca Selengkapnya</a>
                    </div>
                </div>
            `).join('');
        }

        loadArtikel();
    </script>
</body>
</html>
